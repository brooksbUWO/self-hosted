services:

  app_proxy:
    environment:
      # Caddy's cleartext listener (port 80 inside the container).
      # Used only for Umbrel dashboard UI access; HTTPS clients use port 443 directly.
      APP_HOST: brooksbuwo-caddy_caddy_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  caddy:
    build:
      context: ${APP_DATA_DIR}
      dockerfile: Dockerfile
    restart: on-failure
    # Publish ONLY 443 to the host (tailnet HTTPS at 100.64.0.2:443). Do NOT publish
    # host port 80: umbrelOS already binds host :80 for its dashboard, so a "80:80"
    # host publish makes `docker compose up` fail to bind and umbreld's install returns
    # false. Caddy's internal :80 (HTTP->HTTPS redirect) still works inside the container,
    # and the app_proxy reaches Caddy over the Docker network via APP_HOST:APP_PORT (the
    # CONTAINER port 80), which needs no host publish.
    ports:
      - "443:443"
    volumes:
      - ${APP_DATA_DIR}/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APP_DATA_DIR}/caddy-data:/data
      - ${APP_DATA_DIR}/caddy-config:/config
    environment:
      CF_API_TOKEN: ${APP_CF_API_TOKEN}
