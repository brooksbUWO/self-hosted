version: "3.7"

services:

  app_proxy:
    depends_on:
      - traefik
    environment:
      APP_HOST: brooksbuwo-headscale_traefik_1
      APP_PORT: 80
      # Tailscale clients and headscale-admin's API calls must reach headscale
      # without Umbrel's login wall. Same setting as the reference package.
      PROXY_AUTH_ADD: "false"

  headscale:
    # Custom build adds the /android configuration endpoint (same pattern as /apple).
    # Built from upstream v0.29.1 source with three patched files in headscale-src/.
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: serve
    # Tailscale clients must reach headscale WITHOUT app_proxy in the path:
    # app_proxy closes connections carrying the non-websocket
    # "Upgrade: tailscale-control-protocol" header (the /ts2021 Noise
    # handshake), so client logins through the 37070 chain never complete.
    # 37071 exposes headscale directly for --login-server; the admin UI and
    # REST API stay on 37070 behind Traefik for the same-origin layout.
    ports:
      - "37071:8080"
    volumes:
      - "${APP_DATA_DIR}/config.yaml:/etc/headscale/config.yaml:ro"
      - "${APP_DATA_DIR}/data/lib:/var/lib/headscale"
      - "${APP_DATA_DIR}/data/run:/var/run/headscale"
    labels:
      - traefik.enable=true
      - traefik.http.routers.headscale-rtr.rule=PathPrefix(`/`)
      - traefik.http.services.headscale-svc.loadbalancer.server.port=8080

  headscale_admin:
    image: >-
      goodieshq/headscale-admin:0.25.6@sha256:d57c1d0e160f5a8aa3082e819050a43c0cd81b572e71da9b1e0cd499d18b48c1
    restart: on-failure
    depends_on:
      - headscale
    labels:
      - traefik.enable=true
      - traefik.http.routers.headscale-admin-rtr.rule=PathPrefix(`/admin`)
      - traefik.http.services.headscale-admin-svc.loadbalancer.server.port=80

  # headscale's REST API sends no CORS headers and rejects preflight OPTIONS,
  # so headscale-admin (a browser SPA) can only talk to it from the SAME origin.
  # Traefik serves both on one port: /admin -> admin UI, everything else -> headscale.
  # PathPrefix-only rules (no Host matcher) so IP, umbrel.local, and tailnet
  # hostnames all work without the reference package's manual exports.sh edit.
  traefik:
    image: >-
      traefik:v3.4.1@sha256:cd40ab7bc1f047731d5b22595203812343efcb6538014c4e93221cfc3a77217a
    restart: on-failure
    command:
      - "--providers.docker"
      - "--entrypoints.web.address=:80"
      - "--global.sendAnonymousUsage=false"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
