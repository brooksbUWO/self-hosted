gallery: []
releaseNotes: >-
  Version 0.29.1-3: adds Headplane as the admin UI (replaces headscale-admin). The admin
  dashboard opens after Umbrel login with no terminal and no API key paste. Also ships the
  /android configuration endpoint compiled from source (introduced in 0.29.1-2 as a
  Dockerfile build; the /android endpoint returns the Android enrollment page at /android).
dependencies: []
