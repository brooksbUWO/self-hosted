manifestVersion: 1
id: brooksbuwo-headscale
name: Headscale
tagline: Self-hosted, open-source Tailscale control server
icon: https://raw.githubusercontent.com/juanfont/headscale/main/docs/assets/logo/headscale3_header_stacked_left.png
category: networking
version: "0.29.1-2"
port: 37070
description: >-
  Headscale is an open-source implementation of the Tailscale control server. It lets you
  run your own private mesh VPN (built on WireGuard) without depending on Tailscale's hosted
  coordination service.


  This package runs the headscale daemon plus headscale-admin, a browser-based admin UI for
  managing users, pre-auth keys, nodes, and routes. Both are served on one port through an
  embedded reverse proxy: the admin UI at /admin, the headscale API everywhere else. Tailscale
  client devices connect on a separate direct port (37071) that bypasses Umbrel's app proxy,
  which cannot carry the Tailscale control protocol handshake.


  headscale-admin needs an API key to authenticate; create one after install with a single
  command (see the README in this app's folder) and paste it into the admin UI's Settings page.
developer: Juan Font
website: https://headscale.net/
submitter: brooksbUWO
submission: https://github.com/brooksbUWO/self-hosted
repo: https://github.com/juanfont/headscale
support: https://github.com/juanfont/headscale/issues
gallery: []
releaseNotes: >-
  Fix Tailscale client logins: expose headscale directly on port 37071 for client
  registration. Umbrel's app proxy closes connections that carry the Tailscale control
  protocol upgrade (the /ts2021 Noise handshake), so clients pointed at the app port
  (37070) could fetch the server key but never complete registration. Point Tailscale
  clients at http://<umbrel-ip>:37071; the admin UI and REST API remain on 37070.
dependencies: []
path: "/admin"
defaultUsername: ""
defaultPassword: ""
