version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: brooksbUWO-headscale_headscale-admin_1
      APP_PORT: 80

  headscale:
    image: >-
      ghcr.io/juanfont/headscale:0.29.1@sha256:8453e47ea6bf69cd2c550d230ad23f4cf9d0e7daa31c652da3cbb88dca059c62
    restart: on-failure
    user: "1000:1000"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        headscale serve &
        SERVE_PID=$$!
        until [ -S /var/run/headscale/headscale.sock ]; do sleep 1; done
        if [ ! -f /var/lib/headscale/api-key.txt ]; then
          headscale apikeys create --expiration 8760h > /var/lib/headscale/api-key.txt
        fi
        wait "$$SERVE_PID"
    environment:
      HEADSCALE_SERVER_URL: "http://${DEVICE_DOMAIN_NAME}:37070"
      HEADSCALE_LISTEN_ADDR: "0.0.0.0:8080"
      HEADSCALE_METRICS_LISTEN_ADDR: "127.0.0.1:9090"
      HEADSCALE_UNIX_SOCKET: "/var/run/headscale/headscale.sock"
      HEADSCALE_DATABASE_TYPE: sqlite
      HEADSCALE_DATABASE_SQLITE_PATH: /var/lib/headscale/db.sqlite
    volumes:
      - "${APP_DATA_DIR}/data/lib:/var/lib/headscale"
      - "${APP_DATA_DIR}/data/run:/var/run/headscale"
    ports:
      - "37070:8080"

  headscale-admin:
    image: >-
      goodieshq/headscale-admin:0.25.6@sha256:d57c1d0e160f5a8aa3082e819050a43c0cd81b572e71da9b1e0cd499d18b48c1
    restart: on-failure
    depends_on:
      - headscale
