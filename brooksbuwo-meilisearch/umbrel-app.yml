manifestVersion: 1
id: brooksbuwo-meilisearch
name: Meilisearch
tagline: Full-text search backend for Linkwarden
icon: https://raw.githubusercontent.com/meilisearch/meilisearch/main/assets/logo.svg
category: utilities
version: "1.12.8"
# Dashboard-access port that umbreld's app_proxy binds on the HOST for the "Open" link.
# 37090 was audited free against every custom-store manifest (RESEARCH.md Port Audit);
# Wave 2 re-confirms it is free on-box (ss -tlnp) before install. The real Meilisearch
# listener is 7700 inside the container, internal-only, never published to the host.
port: 37090
description: >-
  Standalone Meilisearch full-text search backend for Linkwarden. The Umbrel
  Linkwarden package ships no search service, so its Search Indexing job cannot
  run. This app adds Meilisearch on the shared Docker network and a self-healing
  sidecar that wires MEILI_HOST + MEILI_MASTER_KEY into Linkwarden's compose and
  re-applies them automatically if a Linkwarden update overwrites the file.
  Tailnet-only: reachable through the Umbrel dashboard over the headscale tailnet.
developer: Meili SAS
website: https://www.meilisearch.com
submitter: brooksbUWO
submission: https://github.com/brooksbUWO/self-hosted
repo: https://github.com/meilisearch/meilisearch
support: https://github.com/meilisearch/meilisearch/issues
gallery: []
releaseNotes: >-
  Initial release. Standalone Meilisearch backend for Linkwarden full-text
  search. Includes a linkwarden-patcher sidecar that keeps MEILI_HOST and
  MEILI_MASTER_KEY applied to Linkwarden across app updates.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
